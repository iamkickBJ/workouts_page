name: Publish GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
  # 👇👇👇 核心修复：加回了这一段，允许被 run_data_sync 调用 👇👇👇
  workflow_call:
    inputs:
      save_data_in_github_cache:
        required: false
        type: boolean
      data_cache_prefix:
        required: false
        type: string
  # 👆👆👆 核心修复结束 👆👆👆

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: pnpm/action-setup@v3
        name: Install pnpm
        with:
          version: 8
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Restore Data Cache
        if: inputs.save_data_in_github_cache == true
        uses: actions/cache@v4
        with:
          path: |
            activities
            assets
            GPX_OUT
            TCX_OUT
            FIT_OUT
            Workouts
            run_page/data.db
            src/static/activities.json
            imported.json
          key: ${{ inputs.data_cache_prefix }}-${{ github.sha }}-${{ github.run_id }}
          restore-keys: |
            ${{ inputs.data_cache_prefix }}-${{ github.sha }}-

      - name: Build
        run: |
          MAPBOX_TOKEN_FROM_SECRET="${{ secrets.VITE_MAPBOX_TOKEN }}"
          if [ -z "$MAPBOX_TOKEN_FROM_SECRET" ]; then
            MAPBOX_TOKEN_FROM_SECRET="${{ secrets.MAPBOX_TOKEN }}"
          fi
          if [ -n "$MAPBOX_TOKEN_FROM_SECRET" ]; then
            echo "::add-mask::$MAPBOX_TOKEN_FROM_SECRET"
            export VITE_MAPBOX_TOKEN="$MAPBOX_TOKEN_FROM_SECRET"
          else
            echo "Mapbox token secret is empty. Build will continue without map tiles."
          fi
          pnpm build
          touch dist/.nojekyll
          # 👇 修复白屏的逻辑依然保留
          cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
